<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

  <!-- Estilos globales -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Partículas de fondo -->
<div id="particles"></div>

<!-- ══════════════════════════════════
     SIDEBAR
══════════════════════════════════ -->
<nav class="sidebar">
  <div class="sidebar-logo">Portafolio</div>

  <!-- Avatar SVG ilustrado -->
  <div class="sidebar-avatar" title="Mittsy Andazola">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <circle cx="36" cy="36" r="36" fill="#fce4ea"/>
      <ellipse cx="36" cy="53" rx="20" ry="13" fill="#e87a96"/>
      <ellipse cx="36" cy="30" rx="14" ry="14" fill="#f8d0d8"/>
      <ellipse cx="36" cy="22" rx="14" ry="10" fill="#3d1f0a"/>
      <ellipse cx="25.5" cy="30" rx="4.5" ry="10.5" fill="#3d1f0a"/>
      <ellipse cx="46.5" cy="30" rx="4.5" ry="10.5" fill="#3d1f0a"/>
      <!-- Ojo guiñado -->
      <path d="M29.5 29 Q33 25 36 29" stroke="#2d2d2d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Ojo abierto -->
      <ellipse cx="41.5" cy="28.5" rx="5.5" ry="6" fill="#2d2d2d"/>
      <ellipse cx="43" cy="27"   rx="1.8" ry="1.8" fill="white"/>
      <!-- Rubor -->
      <ellipse cx="27" cy="34" rx="5" ry="2.8" fill="rgba(240,150,150,.3)"/>
      <ellipse cx="45" cy="34" rx="5" ry="2.8" fill="rgba(240,150,150,.3)"/>
      <!-- Sonrisa -->
      <path d="M29 38 Q36 44 43 38" stroke="#c04060" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Aretes -->
      <circle cx="21" cy="36" r="3.5" fill="#f7c842" stroke="#daa520" stroke-width="1"/>
      <circle cx="51" cy="36" r="3.5" fill="#f7c842" stroke="#daa520" stroke-width="1"/>
    </svg>
  </div>

  <div class="sidebar-name">Mittsy Andazola<br>Antillon</div>

  <!-- Navegación -->
  <nav class="sidebar-nav">

    <a class="nav-item" style="--ni:0" data-tab="contacto"
       href="#" onclick="switchTab('contacto', this); return false;">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.82 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 3.09 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </span>
      <span class="nav-label">Contacto</span>
    </a>

    <a class="nav-item" style="--ni:1" data-tab="horario"
       href="#" onclick="switchTab('horario', this); return false;">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8"  y1="2" x2="8"  y2="6"/>
          <line x1="3"  y1="10" x2="21" y2="10"/>
        </svg>
      </span>
      <span class="nav-label">Horario</span>
    </a>

    <a class="nav-item active" style="--ni:2" data-tab="unidades"
       href="#" onclick="switchTab('unidades', this); toggleSub(); return false;">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      <span class="nav-label">Unidades</span>
    </a>

    <div class="nav-sub open" id="nav-sub">
      <a href="#" onclick="switchTab('unidad1', null); return false;">› Unidad 1</a>
      <a href="#" onclick="switchTab('unidad2', null); return false;">› Unidad 2</a>
      <a href="#" onclick="switchTab('unidad3', null); return false;">› Unidad 3</a>
      <a href="#" onclick="switchTab('unidad4', null); return false;">› Unidad 4</a>
    </div>

  </nav>
</nav>

<!-- ══════════════════════════════════
     MAIN
══════════════════════════════════ -->
<main class="main">

  <div class="panels" id="panels">

    <!-- Panel Contacto -->
    <div class="panel" id="panel-contacto"></div>

    <!-- Panel Horario -->
    <div class="panel" id="panel-horario"></div>

    <!-- Panel Unidades (temario) -->
    <div class="panel active anim-in" id="panel-unidades"></div>

    <!-- Paneles individuales por unidad -->
    <div class="panel" id="panel-unidad1"></div>
    <div class="panel" id="panel-unidad2"></div>
    <div class="panel" id="panel-unidad3"></div>
    <div class="panel" id="panel-unidad4"></div>

  </div>
</main>

<!-- ══════════════════════════════════
     JAVASCRIPT
══════════════════════════════════ -->
<script>
/* ─────────────────────────────────────
   Partículas de fondo
───────────────────────────────────── */
(function () {
  const container = document.getElementById('particles');
  const colors = ['#fce8ec', '#f5b8c8', '#e87a96', '#c8a9e0', '#f9d0dc', '#fce7f3'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 6 + Math.random() * 14;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%;
      top:${80 + Math.random() * 25}%;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      --dur:${5 + Math.random() * 8}s;
      --delay:${Math.random() * 7}s;
    `;
    container.appendChild(p);
  }
})();

/* ─────────────────────────────────────
   Carga de páginas (fetch)
───────────────────────────────────── */
const pageCache = {};

async function loadPage(tabId) {
  if (pageCache[tabId]) return pageCache[tabId];
  try {
    const res = await fetch(`pages/${tabId}.html`);
    if (!res.ok) throw new Error(`No se pudo cargar pages/${tabId}.html`);
    const html = await res.text();
    pageCache[tabId] = html;
    return html;
  } catch (e) {
    console.warn(e);
    return `<p style="color:var(--pink-dark);padding:20px;">No se pudo cargar el contenido de <strong>${tabId}</strong>.</p>`;
  }
}

/* ─────────────────────────────────────
   Cambio de pestaña
───────────────────────────────────── */
let currentTab = 'unidades';

async function switchTab(id, navEl) {
  if (id === currentTab) return;

  // Cargar contenido si aún no está en el DOM
  const panel = document.getElementById('panel-' + id);
  if (panel && panel.innerHTML.trim() === '') {
    panel.innerHTML = '<p style="padding:20px;color:var(--pink-main)">Cargando…</p>';
    const html = await loadPage(id);
    panel.innerHTML = html;
  }

  // Ocultar panel actual
  const oldPanel = document.getElementById('panel-' + currentTab);
  if (oldPanel) oldPanel.classList.remove('active', 'anim-in');

  // Mostrar nuevo panel
  if (panel) {
    panel.classList.add('active');
    void panel.offsetWidth;
    panel.classList.add('anim-in');
  }

  currentTab = id;

  // Actualizar sidebar nav-items
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const mainTab = ['unidad1','unidad2','unidad3','unidad4'].includes(id) ? 'unidades' : id;
  const activeNav = navEl || document.querySelector(`.nav-item[data-tab="${mainTab}"]`);
  if (activeNav) activeNav.classList.add('active');

  // Abrir sub-menú si se navega a una unidad
  if (['unidades','unidad1','unidad2','unidad3','unidad4'].includes(id)) {
    document.getElementById('nav-sub').classList.add('open');
  }

  // Confetti
  spawnConfetti(activeNav);
}

/* ─────────────────────────────────────
   Sub-menú Unidades
───────────────────────────────────── */
function toggleSub() {
  document.getElementById('nav-sub').classList.toggle('open');
}

/* ─────────────────────────────────────
   Confetti al cambiar pestaña
───────────────────────────────────── */
function spawnConfetti(origin) {
  const colors = ['#e87a96', '#f5b8c8', '#c8a9e0', '#f7c842', '#7ec879', '#93c4f0'];
  const rect = origin ? origin.getBoundingClientRect() : { left: window.innerWidth / 2, top: 100 };
  const cx = rect.left + (rect.width || 0) / 2;
  const cy = rect.top;

  for (let i = 0; i < 18; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const angle = Math.random() * 360;
    const distance = 60 + Math.random() * 80;
    const tx = Math.cos((angle * Math.PI) / 180) * distance;
    const ty = Math.sin((angle * Math.PI) / 180) * distance - 60;
    piece.style.cssText = `
      left:${cx}px; top:${cy}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      transform:translate(-50%,-50%);
      animation-duration:${0.9 + Math.random() * 0.5}s;
      --tx:${tx}px; --ty:${ty}px;
    `;
    document.body.appendChild(piece);
    piece.addEventListener('animationend', () => piece.remove());
  }
}

/* ─────────────────────────────────────
   Cargar el panel Unidades al arrancar
───────────────────────────────────── */
window.addEventListener('DOMContentLoaded', async () => {
  const panel = document.getElementById('panel-unidades');
  const html = await loadPage('unidades');
  panel.innerHTML = html;
});
</script>

</body>
</html>
